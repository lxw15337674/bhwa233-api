<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>命令配置中心</title>
    <style>
      :root {
        --bg: #f6f1e8;
        --panel: rgba(255, 252, 246, 0.92);
        --line: #d9cbb5;
        --ink: #1f2933;
        --subtle: #6b7280;
        --accent: #a64b2a;
        --accent-soft: #f3d7c5;
        --success: #1f7a4c;
        --danger: #c0392b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, #f7dbc5 0, transparent 28%),
          radial-gradient(circle at bottom right, #eed8b7 0, transparent 34%),
          linear-gradient(135deg, #f8f4ed, #efe6d9 55%, #f4efe6);
        min-height: 100vh;
      }

      .shell {
        max-width: 1320px;
        margin: 0 auto;
        padding: 32px 20px 40px;
      }

      .hero {
        padding: 28px;
        border: 1px solid rgba(166, 75, 42, 0.18);
        background: linear-gradient(140deg, rgba(255,255,255,0.86), rgba(252,242,233,0.9));
        border-radius: 24px;
        box-shadow: 0 18px 60px rgba(64, 39, 22, 0.08);
      }

      h1, h2 {
        margin: 0 0 10px;
        font-family: Georgia, "Times New Roman", serif;
        letter-spacing: 0.02em;
      }

      p {
        margin: 0;
        color: var(--subtle);
        line-height: 1.6;
      }

      .layout {
        display: grid;
        grid-template-columns: 420px 1fr;
        gap: 20px;
        margin-top: 22px;
      }

      .panel {
        background: var(--panel);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(217, 203, 181, 0.9);
        border-radius: 22px;
        padding: 22px;
        box-shadow: 0 12px 36px rgba(88, 58, 33, 0.08);
      }

      .fields {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        color: var(--subtle);
      }

      input, select, textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--ink);
        font: inherit;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        cursor: pointer;
        font: inherit;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .secondary {
        background: #f2e7da;
        color: var(--ink);
      }

      .danger {
        background: #f9ded8;
        color: var(--danger);
      }

      .muted {
        font-size: 13px;
        color: var(--subtle);
      }

      .inline-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .inline-row input[type="file"] {
        padding: 10px;
        background: rgba(255, 255, 255, 0.72);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
        align-items: center;
      }

      .toolbar input {
        max-width: 280px;
      }

      .status {
        margin-top: 12px;
        min-height: 22px;
        font-size: 14px;
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--success);
      }

      .command-list {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .command-card {
        border: 1px solid rgba(166, 75, 42, 0.12);
        background: rgba(255,255,255,0.72);
        border-radius: 18px;
        padding: 16px;
      }

      .command-card header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }

      .command-card h3 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .chip {
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        padding: 5px 10px;
      }

      .preview {
        margin-top: 18px;
        border: 1px dashed var(--line);
        border-radius: 18px;
        padding: 16px;
        min-height: 180px;
        background: rgba(255,255,255,0.52);
      }

      .preview img {
        max-width: 100%;
        border-radius: 12px;
        display: block;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        font-family: Consolas, "Courier New", monospace;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <h1>命令配置中心</h1>
        <p>使用独立的命令 Key 进入管理后台。已保存的命令会全局生效，当前只支持精确匹配，不支持参数。</p>
        <div class="toolbar">
          <input id="commandKey" type="password" placeholder="输入 x-command-key" />
          <button class="secondary" id="loadBtn" type="button">加载命令</button>
          <span class="muted">请求头使用 `x-command-key`，与 `API_SECRET_KEY` 独立。</span>
        </div>
        <div id="topStatus" class="status"></div>
      </section>

      <section class="layout">
        <div class="panel">
          <h2>编辑命令</h2>
          <p class="muted">支持文本、真实图片 URL、本地上传转 base64、文本渲染成图片。</p>
          <form id="commandForm" class="fields">
            <input id="commandId" type="hidden" />
            <label>
              命令
              <input id="command" type="text" maxlength="100" placeholder="例如：图片1" required />
            </label>
            <label>
              说明
              <input id="description" type="text" maxlength="500" placeholder="给自己看的备注" />
            </label>
            <label>
              回复类型
              <select id="replyType">
                <option value="TEXT">文本</option>
                <option value="IMAGE_URL">图片 URL</option>
                <option value="RENDERED_IMAGE">文本渲染图</option>
              </select>
            </label>
            <label id="contentTextWrap">
              文本内容
              <textarea id="contentText" placeholder="TEXT 直接返回；RENDERED_IMAGE 会渲染成图片"></textarea>
            </label>
            <label id="imageUrlWrap" style="display:none">
              图片地址或 Base64
              <input id="imageUrl" type="text" placeholder="https://example.com/demo.jpg 或 data:image/...;base64,..." />
            </label>
            <label id="imageUploadWrap" style="display:none">
              上传图片转 Base64
              <div class="inline-row">
                <input id="imageFile" type="file" accept="image/*" />
                <button class="secondary" id="clearImageBtn" type="button">清空图片</button>
              </div>
              <span class="muted">上传后会自动转成 base64 并填入上面的字段。建议单张图片控制在 8MB 内。</span>
            </label>
            <label>
              <span>启用</span>
              <select id="enabled">
                <option value="true">启用</option>
                <option value="false">禁用</option>
              </select>
            </label>
            <div class="actions">
              <button class="primary" id="saveBtn" type="submit">保存命令</button>
              <button class="secondary" id="previewBtn" type="button">预览效果</button>
              <button class="secondary" id="resetBtn" type="button">清空表单</button>
            </div>
          </form>
          <div id="formStatus" class="status"></div>
        </div>

        <div class="panel">
          <h2>命令列表</h2>
          <p class="muted">这里展示的是全局命令列表。`x-command-key` 只用于管理权限，不影响命令执行。</p>
          <div id="list" class="command-list"></div>
          <div class="preview">
            <h2 style="margin-bottom:12px">预览</h2>
            <div id="previewArea" class="muted">点“预览效果”查看返回内容。</div>
          </div>
        </div>
      </section>
    </div>

    <script>
      const commandKeyInput = document.getElementById('commandKey');
      const loadBtn = document.getElementById('loadBtn');
      const listEl = document.getElementById('list');
      const topStatus = document.getElementById('topStatus');
      const formStatus = document.getElementById('formStatus');
      const previewArea = document.getElementById('previewArea');
      const form = document.getElementById('commandForm');
      const replyType = document.getElementById('replyType');
      const contentTextWrap = document.getElementById('contentTextWrap');
      const imageUrlWrap = document.getElementById('imageUrlWrap');
      const imageUploadWrap = document.getElementById('imageUploadWrap');
      const imageFileInput = document.getElementById('imageFile');

      function setStatus(target, text, type) {
        target.textContent = text || '';
        target.className = 'status' + (type ? ' ' + type : '');
      }

      function getHeaders(includeJson = true) {
        const key = commandKeyInput.value.trim();
        const headers = {
          'x-command-key': key,
        };
        if (includeJson) {
          headers['Content-Type'] = 'application/json';
        }
        return headers;
      }

      function syncReplyFields() {
        const value = replyType.value;
        contentTextWrap.style.display = value === 'IMAGE_URL' ? 'none' : 'grid';
        imageUrlWrap.style.display = value === 'IMAGE_URL' ? 'grid' : 'none';
        imageUploadWrap.style.display = value === 'IMAGE_URL' ? 'grid' : 'none';
      }

      function readFormData() {
        return {
          command: document.getElementById('command').value.trim(),
          description: document.getElementById('description').value.trim(),
          replyType: replyType.value,
          contentText: document.getElementById('contentText').value,
          imageUrl: document.getElementById('imageUrl').value.trim(),
          enabled: document.getElementById('enabled').value === 'true',
        };
      }

      function fillForm(item) {
        document.getElementById('commandId').value = item.id || '';
        document.getElementById('command').value = item.command || '';
        document.getElementById('description').value = item.description || '';
        document.getElementById('replyType').value = item.replyType || 'TEXT';
        document.getElementById('contentText').value = item.contentText || '';
        document.getElementById('imageUrl').value = item.imageUrl || '';
        document.getElementById('enabled').value = String(item.enabled ?? true);
        syncReplyFields();
      }

      function resetForm() {
        fillForm({
          replyType: 'TEXT',
          enabled: true,
        });
        imageFileInput.value = '';
        setStatus(formStatus, '', '');
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ''));
          reader.onerror = () => reject(new Error('图片读取失败'));
          reader.readAsDataURL(file);
        });
      }

      function renderPreview(result) {
        if (!result || !result.content) {
          previewArea.innerHTML = '<span class="muted">没有可预览内容</span>';
          return;
        }

        if (result.type === 'image') {
          previewArea.innerHTML = '';
          const img = document.createElement('img');
          img.src = result.content;
          img.alt = 'preview';
          previewArea.appendChild(img);
          return;
        }

        previewArea.innerHTML = '';
        const pre = document.createElement('pre');
        pre.textContent = result.content;
        previewArea.appendChild(pre);
      }

      async function request(path, options = {}) {
        const response = await fetch(path, options);
        const text = await response.text();
        const data = text ? JSON.parse(text) : null;
        if (!response.ok) {
          throw new Error(data?.message || text || '请求失败');
        }
        return data;
      }

      async function loadCommands() {
        try {
          setStatus(topStatus, '加载中...', '');
          const data = await request('/api/command/config', {
            headers: getHeaders(false),
          });
          listEl.innerHTML = '';

          if (!data.length) {
            listEl.innerHTML = '<div class="muted">当前 Key 还没有命令。</div>';
          }

          data.forEach((item) => {
            const card = document.createElement('article');
            card.className = 'command-card';
            card.innerHTML = `
              <header>
                <div>
                  <h3>${escapeHtml(item.command)}</h3>
                  <div class="muted">命令：${escapeHtml(item.command)}</div>
                </div>
                <div class="chips">
                  <span class="chip">${escapeHtml(item.replyType)}</span>
                  <span class="chip">${item.enabled ? '启用' : '禁用'}</span>
                </div>
              </header>
              <p style="margin-top:12px">${escapeHtml(item.description || '无说明')}</p>
              <div class="actions">
                <button class="secondary" data-action="edit" data-id="${item.id}">编辑</button>
                <button class="secondary" data-action="preview" data-id="${item.id}">预览</button>
                <button class="danger" data-action="delete" data-id="${item.id}">删除</button>
              </div>
            `;

            card.querySelector('[data-action="edit"]').addEventListener('click', () => fillForm(item));
            card.querySelector('[data-action="preview"]').addEventListener('click', () => renderPreviewFromItem(item));
            card.querySelector('[data-action="delete"]').addEventListener('click', () => removeCommand(item.id));
            listEl.appendChild(card);
          });

          setStatus(topStatus, `已加载 ${data.length} 条命令`, 'success');
        } catch (error) {
          setStatus(topStatus, error.message, 'error');
        }
      }

      async function renderPreviewFromItem(item) {
        try {
          const data = await request('/api/command/config/preview', {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify({
              command: item.command,
              description: item.description || '',
              replyType: item.replyType,
              contentText: item.contentText || '',
              imageUrl: item.imageUrl || '',
              enabled: item.enabled,
            }),
          });
          renderPreview(data);
        } catch (error) {
          setStatus(formStatus, error.message, 'error');
        }
      }

      async function removeCommand(id) {
        if (!confirm('确定删除这条命令吗？')) {
          return;
        }

        try {
          await request(`/api/command/config/${id}`, {
            method: 'DELETE',
            headers: getHeaders(false),
          });
          setStatus(topStatus, '删除成功', 'success');
          await loadCommands();
        } catch (error) {
          setStatus(topStatus, error.message, 'error');
        }
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      replyType.addEventListener('change', syncReplyFields);
      loadBtn.addEventListener('click', loadCommands);

      document.getElementById('previewBtn').addEventListener('click', async () => {
        try {
          const data = await request('/api/command/config/preview', {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify(readFormData()),
          });
          renderPreview(data);
          setStatus(formStatus, '预览生成成功', 'success');
        } catch (error) {
          setStatus(formStatus, error.message, 'error');
        }
      });

      document.getElementById('resetBtn').addEventListener('click', resetForm);
      document.getElementById('clearImageBtn').addEventListener('click', () => {
        document.getElementById('imageUrl').value = '';
        imageFileInput.value = '';
        setStatus(formStatus, '图片内容已清空', 'success');
      });

      imageFileInput.addEventListener('change', async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) {
          return;
        }

        if (file.size > 8 * 1024 * 1024) {
          imageFileInput.value = '';
          setStatus(formStatus, '图片过大，请控制在 8MB 以内', 'error');
          return;
        }

        try {
          const dataUrl = await fileToDataUrl(file);
          document.getElementById('imageUrl').value = dataUrl;
          renderPreview({ type: 'image', content: dataUrl });
          setStatus(formStatus, `已载入图片：${file.name}`, 'success');
        } catch (error) {
          setStatus(formStatus, error.message, 'error');
        }
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          const id = document.getElementById('commandId').value.trim();
          const method = id ? 'PUT' : 'POST';
          const path = id ? `/api/command/config/${id}` : '/api/command/config';
          await request(path, {
            method,
            headers: getHeaders(),
            body: JSON.stringify(readFormData()),
          });
          setStatus(formStatus, id ? '更新成功' : '创建成功', 'success');
          resetForm();
          await loadCommands();
        } catch (error) {
          setStatus(formStatus, error.message, 'error');
        }
      });

      resetForm();
      syncReplyFields();
    </script>
  </body>
</html>
