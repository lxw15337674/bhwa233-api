<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>命令审核中心</title>
    <style>
      :root {
        --bg: #f5efe5;
        --panel: rgba(255, 251, 245, 0.95);
        --line: #d8c7b0;
        --ink: #20262e;
        --subtle: #6f7681;
        --accent: #a34c2a;
        --accent-soft: #f7ddd0;
        --ok: #1b7f4b;
        --warn: #c57c17;
        --danger: #bf3d30;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, #f9ddc7 0, transparent 26%),
          radial-gradient(circle at bottom right, #f2dfc2 0, transparent 35%),
          linear-gradient(135deg, #faf7f2, #efe4d6 55%, #f8f2e9);
      }

      .shell {
        max-width: 1380px;
        margin: 0 auto;
        padding: 28px 18px 36px;
      }

      .hero,
      .panel {
        border-radius: 24px;
        border: 1px solid rgba(163, 76, 42, 0.14);
        background: var(--panel);
        box-shadow: 0 14px 42px rgba(89, 57, 31, 0.08);
      }

      .hero {
        padding: 28px;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
      }

      p {
        margin: 0;
        color: var(--subtle);
        line-height: 1.6;
      }

      .toolbar,
      .filters,
      .actions,
      .inline-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .toolbar {
        margin-top: 18px;
      }

      .layout {
        display: grid;
        grid-template-columns: 420px 1fr;
        gap: 20px;
        margin-top: 22px;
      }

      .panel {
        padding: 22px;
      }

      .fields {
        display: grid;
        gap: 14px;
        margin-top: 18px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        color: var(--subtle);
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.85);
        color: var(--ink);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .secondary {
        background: #efe3d5;
        color: var(--ink);
      }

      .danger {
        background: #f7dcd7;
        color: var(--danger);
      }

      .success {
        background: #dceedd;
        color: var(--ok);
      }

      .warning {
        background: #f8e8c7;
        color: var(--warn);
      }

      .muted {
        color: var(--subtle);
        font-size: 13px;
      }

      .status {
        min-height: 22px;
        margin-top: 12px;
        font-size: 14px;
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--ok);
      }

      .filters {
        margin-top: 16px;
      }

      .list {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .item {
        border-radius: 18px;
        border: 1px solid rgba(163, 76, 42, 0.12);
        background: rgba(255, 255, 255, 0.72);
        padding: 16px;
      }

      .item header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 12px;
        background: var(--accent-soft);
        color: var(--accent);
      }

      .chip.pending {
        background: #f8e8c7;
        color: var(--warn);
      }

      .chip.approved {
        background: #dceedd;
        color: var(--ok);
      }

      .chip.rejected {
        background: #f7dcd7;
        color: var(--danger);
      }

      .preview {
        margin-top: 18px;
        border-radius: 18px;
        border: 1px dashed var(--line);
        background: rgba(255, 255, 255, 0.55);
        min-height: 180px;
        padding: 16px;
      }

      .preview img {
        max-width: 100%;
        border-radius: 12px;
        display: block;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: Consolas, "Courier New", monospace;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <h1>命令审核中心</h1>
        <p>命令创建后默认进入列表待审核，只有审核通过的命令才会生效。新建命令可以不带 key，管理和审核操作继续使用同一个 `x-command-key`。</p>
        <div class="toolbar">
          <input id="commandKey" type="password" placeholder="输入管理 x-command-key" />
          <button class="secondary" id="loadBtn" type="button">刷新列表</button>
        </div>
        <div id="topStatus" class="status"></div>
      </section>

      <section class="layout">
        <div class="panel">
          <h2>新建 / 编辑命令</h2>
          <p class="muted">保存后默认进入待审核。图片类型支持 URL、本地上传转 base64，文本类型支持文本渲染图。</p>
          <form id="commandForm" class="fields">
            <input id="commandId" type="hidden" />
            <label>
              命令
              <input id="command" type="text" maxlength="100" placeholder="例如：辣椒" required />
            </label>
            <label>
              说明
              <input id="description" type="text" maxlength="500" placeholder="给审核人看的说明" />
            </label>
            <label>
              回复类型
              <select id="replyType">
                <option value="TEXT">文本</option>
                <option value="IMAGE_URL">图片 URL / Base64</option>
                <option value="RENDERED_IMAGE">文本渲染图</option>
              </select>
            </label>
            <label id="contentTextWrap">
              文本内容
              <textarea id="contentText" placeholder="TEXT 直接返回；RENDERED_IMAGE 会渲染成图片"></textarea>
            </label>
            <label id="imageUrlWrap" style="display:none">
              图片地址或 Base64
              <input id="imageUrl" type="text" placeholder="https://example.com/a.png 或 data:image/...;base64,..." />
            </label>
            <label id="imageUploadWrap" style="display:none">
              上传图片转 Base64
              <div class="inline-row">
                <input id="imageFile" type="file" accept="image/*" />
                <button class="secondary" id="clearImageBtn" type="button">清空图片</button>
              </div>
              <span class="muted">建议图片控制在 8MB 内。</span>
            </label>
            <div class="actions">
              <button class="primary" id="saveBtn" type="submit">保存命令</button>
              <button class="secondary" id="previewBtn" type="button">预览效果</button>
              <button class="secondary" id="resetBtn" type="button">清空表单</button>
            </div>
          </form>
          <div id="formStatus" class="status"></div>
          <div class="preview">
            <h3 style="margin-bottom:12px">预览</h3>
            <div id="previewArea" class="muted">点“预览效果”查看返回内容。</div>
          </div>
        </div>

        <div class="panel">
          <h2>命令列表</h2>
          <p class="muted">只要审核状态是“已通过”，命令就会进入全局可执行列表。</p>
          <div class="filters">
            <button class="secondary" data-filter="ALL" type="button">全部</button>
            <button class="secondary" data-filter="PENDING" type="button">待审核</button>
            <button class="secondary" data-filter="APPROVED" type="button">已通过</button>
            <button class="secondary" data-filter="REJECTED" type="button">已拒绝</button>
          </div>
          <div id="list" class="list"></div>
        </div>
      </section>
    </div>

    <script>
      const commandKeyInput = document.getElementById('commandKey');
      const listEl = document.getElementById('list');
      const topStatus = document.getElementById('topStatus');
      const formStatus = document.getElementById('formStatus');
      const previewArea = document.getElementById('previewArea');
      const form = document.getElementById('commandForm');
      const replyType = document.getElementById('replyType');
      const contentTextWrap = document.getElementById('contentTextWrap');
      const imageUrlWrap = document.getElementById('imageUrlWrap');
      const imageUploadWrap = document.getElementById('imageUploadWrap');
      const imageFileInput = document.getElementById('imageFile');

      let currentFilter = 'ALL';
      let commandItems = [];

      function setStatus(target, text, type) {
        target.textContent = text || '';
        target.className = 'status' + (type ? ' ' + type : '');
      }

      function getHeaders(_useReviewKey = false, includeJson = true) {
        const key = commandKeyInput.value.trim();
        const headers = { 'x-command-key': key };
        if (includeJson) {
          headers['Content-Type'] = 'application/json';
        }
        return headers;
      }

      function syncReplyFields() {
        const value = replyType.value;
        contentTextWrap.style.display = value === 'IMAGE_URL' ? 'none' : 'grid';
        imageUrlWrap.style.display = value === 'IMAGE_URL' ? 'grid' : 'none';
        imageUploadWrap.style.display = value === 'IMAGE_URL' ? 'grid' : 'none';
      }

      function readFormData() {
        return {
          command: document.getElementById('command').value.trim(),
          description: document.getElementById('description').value.trim(),
          replyType: replyType.value,
          contentText: document.getElementById('contentText').value,
          imageUrl: document.getElementById('imageUrl').value.trim(),
        };
      }

      function fillForm(item) {
        document.getElementById('commandId').value = item.id || '';
        document.getElementById('command').value = item.command || '';
        document.getElementById('description').value = item.description || '';
        document.getElementById('replyType').value = item.replyType || 'TEXT';
        document.getElementById('contentText').value = item.contentText || '';
        document.getElementById('imageUrl').value = item.imageUrl || '';
        syncReplyFields();
      }

      function resetForm() {
        document.getElementById('commandId').value = '';
        fillForm({
          replyType: 'TEXT',
        });
        imageFileInput.value = '';
        setStatus(formStatus, '', '');
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ''));
          reader.onerror = () => reject(new Error('图片读取失败'));
          reader.readAsDataURL(file);
        });
      }

      function renderPreview(result) {
        if (!result || !result.content) {
          previewArea.innerHTML = '<span class="muted">没有可预览内容</span>';
          return;
        }

        if (result.type === 'image') {
          previewArea.innerHTML = '';
          const img = document.createElement('img');
          img.src = result.content;
          img.alt = 'preview';
          previewArea.appendChild(img);
          return;
        }

        previewArea.innerHTML = '';
        const pre = document.createElement('pre');
        pre.textContent = result.content;
        previewArea.appendChild(pre);
      }

      async function request(path, options = {}) {
        const response = await fetch(path, options);
        const text = await response.text();
        const data = text ? JSON.parse(text) : null;
        if (!response.ok) {
          throw new Error(data?.message || text || '请求失败');
        }
        return data;
      }

      function escapeHtml(value) {
        return String(value || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function statusLabel(status) {
        if (status === 'APPROVED') return '已通过';
        if (status === 'REJECTED') return '已拒绝';
        return '待审核';
      }

      function renderList() {
        const items = currentFilter === 'ALL'
          ? commandItems
          : commandItems.filter((item) => item.status === currentFilter);

        listEl.innerHTML = '';

        if (!items.length) {
          listEl.innerHTML = '<div class="muted">当前筛选下没有命令。</div>';
          return;
        }

        items.forEach((item) => {
          const article = document.createElement('article');
          article.className = 'item';
          article.innerHTML = `
            <header>
              <div>
                <h3>${escapeHtml(item.command)}</h3>
                <p style="margin-top:6px">${escapeHtml(item.description || '无说明')}</p>
              </div>
              <div class="chips">
                <span class="chip ${item.status.toLowerCase()}">${statusLabel(item.status)}</span>
                <span class="chip">${escapeHtml(item.replyType)}</span>
              </div>
            </header>
            <div class="muted" style="margin-top:10px">审核备注：${escapeHtml(item.reviewComment || '无')}</div>
            <div class="actions" style="margin-top:14px">
              <button class="secondary" data-action="edit">编辑</button>
              <button class="secondary" data-action="preview">预览</button>
              <button class="warning" data-action="submit">提交审核</button>
              <button class="success" data-action="approve">审核通过</button>
              <button class="danger" data-action="reject">审核拒绝</button>
              <button class="danger" data-action="delete">删除</button>
            </div>
          `;

          article.querySelector('[data-action="edit"]').addEventListener('click', () => fillForm(item));
          article.querySelector('[data-action="preview"]').addEventListener('click', () => previewItem(item));
          article.querySelector('[data-action="submit"]').addEventListener('click', () => submitItem(item.id));
          article.querySelector('[data-action="approve"]').addEventListener('click', () => approveItem(item.id));
          article.querySelector('[data-action="reject"]').addEventListener('click', () => rejectItem(item.id));
          article.querySelector('[data-action="delete"]').addEventListener('click', () => removeItem(item.id));
          listEl.appendChild(article);
        });
      }

      async function loadCommands() {
        try {
          setStatus(topStatus, '加载中...', '');
          commandItems = await request('/api/command/config', {
            headers: getHeaders(false),
          });
          renderList();
          setStatus(topStatus, `已加载 ${commandItems.length} 条命令`, 'success');
        } catch (error) {
          setStatus(topStatus, error.message, 'error');
        }
      }

      async function previewItem(item) {
        try {
          const data = await request('/api/command/config/preview', {
            method: 'POST',
            headers: getHeaders(false),
            body: JSON.stringify({
              command: item.command,
              description: item.description || '',
              replyType: item.replyType,
              contentText: item.contentText || '',
              imageUrl: item.imageUrl || '',
            }),
          });
          renderPreview(data);
        } catch (error) {
          setStatus(formStatus, error.message, 'error');
        }
      }

      async function submitItem(id) {
        try {
          await request(`/api/command/config/${id}/submit`, {
            method: 'POST',
            headers: getHeaders(false),
          });
          setStatus(topStatus, '已提交审核', 'success');
          await loadCommands();
        } catch (error) {
          setStatus(topStatus, error.message, 'error');
        }
      }

      async function approveItem(id) {
        try {
          const comment = prompt('审核通过备注', '审核通过') || '审核通过';
          await request(`/api/command/config/${id}/approve`, {
            method: 'POST',
            headers: getHeaders(true),
            body: JSON.stringify({ comment }),
          });
          setStatus(topStatus, '审核通过成功', 'success');
          await loadCommands();
        } catch (error) {
          setStatus(topStatus, error.message, 'error');
        }
      }

      async function rejectItem(id) {
        try {
          const comment = prompt('拒绝原因', '审核拒绝');
          if (comment === null) {
            return;
          }

          await request(`/api/command/config/${id}/reject`, {
            method: 'POST',
            headers: getHeaders(true),
            body: JSON.stringify({ comment }),
          });
          setStatus(topStatus, '已拒绝该命令', 'success');
          await loadCommands();
        } catch (error) {
          setStatus(topStatus, error.message, 'error');
        }
      }

      async function removeItem(id) {
        if (!confirm('确定删除这条命令吗？')) {
          return;
        }

        try {
          await request(`/api/command/config/${id}`, {
            method: 'DELETE',
            headers: getHeaders(false, false),
          });
          setStatus(topStatus, '删除成功', 'success');
          await loadCommands();
        } catch (error) {
          setStatus(topStatus, error.message, 'error');
        }
      }

      document.querySelectorAll('[data-filter]').forEach((button) => {
        button.addEventListener('click', () => {
          currentFilter = button.getAttribute('data-filter');
          renderList();
        });
      });

      replyType.addEventListener('change', syncReplyFields);
      document.getElementById('loadBtn').addEventListener('click', loadCommands);
      document.getElementById('previewBtn').addEventListener('click', async () => {
        try {
          const data = await request('/api/command/config/preview', {
            method: 'POST',
            headers: getHeaders(false),
            body: JSON.stringify(readFormData()),
          });
          renderPreview(data);
          setStatus(formStatus, '预览生成成功', 'success');
        } catch (error) {
          setStatus(formStatus, error.message, 'error');
        }
      });

      document.getElementById('resetBtn').addEventListener('click', resetForm);
      document.getElementById('clearImageBtn').addEventListener('click', () => {
        document.getElementById('imageUrl').value = '';
        imageFileInput.value = '';
        setStatus(formStatus, '图片内容已清空', 'success');
      });

      imageFileInput.addEventListener('change', async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) {
          return;
        }

        if (file.size > 8 * 1024 * 1024) {
          imageFileInput.value = '';
          setStatus(formStatus, '图片过大，请控制在 8MB 以内', 'error');
          return;
        }

        try {
          const dataUrl = await fileToDataUrl(file);
          document.getElementById('imageUrl').value = dataUrl;
          renderPreview({ type: 'image', content: dataUrl });
          setStatus(formStatus, `已载入图片：${file.name}`, 'success');
        } catch (error) {
          setStatus(formStatus, error.message, 'error');
        }
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          const id = document.getElementById('commandId').value.trim();
          const path = id ? `/api/command/config/${id}` : '/api/command/config';
          const method = id ? 'PUT' : 'POST';
          await request(path, {
            method,
            headers: getHeaders(false),
            body: JSON.stringify(readFormData()),
          });
          setStatus(formStatus, id ? '更新成功，状态已重置为待审核' : '创建成功，等待审核', 'success');
          resetForm();
          await loadCommands();
        } catch (error) {
          setStatus(formStatus, error.message, 'error');
        }
      });

      resetForm();
      syncReplyFields();
    </script>
  </body>
</html>
