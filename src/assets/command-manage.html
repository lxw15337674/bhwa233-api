<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>命令审核中心</title>
    <style>
      :root {
        --bg: #f5efe5;
        --panel: rgba(255, 251, 245, 0.95);
        --line: #d8c7b0;
        --ink: #20262e;
        --subtle: #6f7681;
        --accent: #a34c2a;
        --accent-soft: #f7ddd0;
        --ok: #1b7f4b;
        --warn: #c57c17;
        --danger: #bf3d30;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background:
          radial-gradient(circle at top left, #f9ddc7 0, transparent 26%),
          radial-gradient(circle at bottom right, #f2dfc2 0, transparent 35%),
          linear-gradient(135deg, #faf7f2, #efe4d6 55%, #f8f2e9);
      }

      .shell {
        max-width: 1380px;
        margin: 0 auto;
        padding: 28px 18px 36px;
      }

      .hero,
      .panel {
        border-radius: 24px;
        border: 1px solid rgba(163, 76, 42, 0.14);
        background: var(--panel);
        box-shadow: 0 14px 42px rgba(89, 57, 31, 0.08);
      }

      .hero {
        padding: 28px;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-family: Georgia, 'Times New Roman', serif;
      }

      p {
        margin: 0;
        color: var(--subtle);
        line-height: 1.6;
      }

      .toolbar,
      .filters,
      .actions,
      .inline-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .toolbar {
        margin-top: 18px;
      }

      .layout {
        display: grid;
        grid-template-columns: 420px 1fr;
        gap: 20px;
        margin-top: 22px;
      }

      .panel {
        padding: 22px;
      }

      .fields {
        display: grid;
        gap: 14px;
        margin-top: 18px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        color: var(--subtle);
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.85);
        color: var(--ink);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .secondary {
        background: #efe3d5;
        color: var(--ink);
      }

      .danger {
        background: #f7dcd7;
        color: var(--danger);
      }

      .success {
        background: #dceedd;
        color: var(--ok);
      }

      .warning {
        background: #f8e8c7;
        color: var(--warn);
      }

      .muted {
        color: var(--subtle);
        font-size: 13px;
      }

      .status {
        min-height: 22px;
        margin-top: 12px;
        font-size: 14px;
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--ok);
      }

      .mode-hint {
        margin-top: 12px;
        color: var(--subtle);
        font-size: 14px;
      }

      .mode-hint strong {
        color: var(--accent);
      }

      .item.approved {
        border-color: rgba(27, 127, 75, 0.24);
      }

      .item.pending {
        border-color: rgba(197, 124, 23, 0.24);
      }

      .item.rejected {
        border-color: rgba(191, 61, 48, 0.24);
      }

      .state-line {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      dialog.review-dialog {
        width: min(620px, calc(100vw - 32px));
        border: 1px solid rgba(163, 76, 42, 0.18);
        border-radius: 22px;
        padding: 22px;
        background: var(--panel);
        color: var(--ink);
        box-shadow: 0 24px 80px rgba(56, 33, 18, 0.26);
      }

      dialog.review-dialog::backdrop {
        background: rgba(32, 38, 46, 0.38);
      }

      .review-summary {
        margin: 16px 0;
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(163, 76, 42, 0.12);
      }

      .filters {
        margin-top: 16px;
      }

      .list {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .item {
        border-radius: 18px;
        border: 1px solid rgba(163, 76, 42, 0.12);
        background: rgba(255, 255, 255, 0.72);
        padding: 16px;
      }

      .item header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 12px;
        background: var(--accent-soft);
        color: var(--accent);
      }

      .chip.pending {
        background: #f8e8c7;
        color: var(--warn);
      }

      .chip.approved {
        background: #dceedd;
        color: var(--ok);
      }

      .chip.rejected {
        background: #f7dcd7;
        color: var(--danger);
      }

      .preview {
        margin-top: 18px;
        border-radius: 18px;
        border: 1px dashed var(--line);
        background: rgba(255, 255, 255, 0.55);
        min-height: 180px;
        padding: 16px;
      }

      .preview img {
        max-width: 100%;
        border-radius: 12px;
        display: block;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: Consolas, 'Courier New', monospace;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <h1>命令审核中心</h1>
        <p>
          新建命令可以不带 key 投稿审核；填入合法 `x-command-key`
          后，保存会直接生效，无需再单独审批。
        </p>
        <div class="toolbar">
          <input
            id="commandKey"
            type="password"
            placeholder="输入管理 x-command-key（保存即生效）"
          />
          <button class="secondary" id="loadBtn" type="button">刷新列表</button>
        </div>
        <div id="modeHint" class="mode-hint"></div>
        <div id="topStatus" class="status"></div>
      </section>

      <section class="layout">
        <div class="panel">
          <h2 id="formTitle">新建命令</h2>
          <p id="formHint" class="muted">
            投稿模式下可直接新建和预览；填入管理 key
            后可编辑任意命令，保存即直接生效。
          </p>
          <form id="commandForm" class="fields">
            <input id="commandId" type="hidden" />
            <label>
              命令
              <input
                id="command"
                type="text"
                maxlength="100"
                placeholder="例如：辣椒"
                required
              />
            </label>
            <label>
              说明
              <input
                id="description"
                type="text"
                maxlength="500"
                placeholder="给审核人看的说明"
              />
            </label>
            <label>
              回复类型
              <select id="replyType">
                <option value="TEXT">文本</option>
                <option value="IMAGE_URL">图片 URL / 粘贴上传</option>
                <option value="RENDERED_IMAGE">文本渲染图</option>
              </select>
            </label>
            <label id="contentTextWrap">
              文本内容
              <textarea
                id="contentText"
                placeholder="TEXT 直接返回；RENDERED_IMAGE 会渲染成图片"
              ></textarea>
            </label>
            <label id="imageUrlWrap" style="display: none">
              图片 URL / Base64
              <input
                id="imageUrl"
                type="text"
                placeholder="https://example.com/a.png，或粘贴/选择图片后自动回填"
              />
            </label>
            <label id="imageUploadWrap" style="display: none">
              上传图片
              <div class="inline-row">
                <input id="imageFile" type="file" accept="image/*" />
                <button class="secondary" id="clearImageBtn" type="button">
                  清空图片
                </button>
              </div>
              <span class="muted"
                >支持选择本地图片或粘贴剪贴板图片，前端会自动转成
                base64；图片请控制在 2MB 内。</span
              >
            </label>
            <div class="actions">
              <button class="primary" id="saveBtn" type="submit">
                保存命令
              </button>
              <button class="secondary" id="pasteImageBtn" type="button">
                粘贴剪贴板图片
              </button>
              <button class="secondary" id="previewBtn" type="button">
                预览效果
              </button>
              <button class="secondary" id="resetBtn" type="button">
                清空表单
              </button>
            </div>
          </form>
          <div id="formStatus" class="status"></div>
          <div class="preview">
            <h3 style="margin-bottom: 12px">预览</h3>
            <div id="previewArea" class="muted">点“预览效果”查看返回内容。</div>
          </div>
        </div>

        <div class="panel">
          <h2>命令列表</h2>
          <p class="muted">
            只要审核状态是“已通过”，命令就会进入全局可执行列表。
          </p>
          <div class="filters">
            <button class="secondary" data-filter="ALL" type="button">
              全部
            </button>
            <button class="secondary" data-filter="PENDING" type="button">
              待审核
            </button>
            <button class="secondary" data-filter="APPROVED" type="button">
              已通过
            </button>
            <button class="secondary" data-filter="REJECTED" type="button">
              已拒绝
            </button>
          </div>
          <p class="muted" style="margin-top: 12px">
            列表支持回填到顶部表单编辑；带管理 key
            时保存会直接发布，审核按钮只针对待审核命令。
          </p>
          <div id="list" class="list"></div>
        </div>
      </section>
    </div>

    <dialog id="reviewDialog" class="review-dialog">
      <h2 id="reviewTitle">审核命令</h2>
      <p class="muted">
        请先确认命令内容和预览，再提交审核结论。这个动作会直接改变命令生效状态。
      </p>
      <div id="reviewSummary" class="review-summary"></div>
      <label>
        审核备注
        <textarea id="reviewComment" placeholder="请输入审核备注"></textarea>
      </label>
      <div class="actions" style="margin-top: 16px">
        <button class="primary" id="reviewConfirmBtn" type="button">
          确认
        </button>
        <button class="secondary" id="reviewCancelBtn" type="button">
          取消
        </button>
      </div>
    </dialog>

    <script>
      const commandKeyInput = document.getElementById('commandKey');
      const COMMAND_KEY_STORAGE_KEY = 'commandManageKey';
      const listEl = document.getElementById('list');
      const topStatus = document.getElementById('topStatus');
      const formStatus = document.getElementById('formStatus');
      const previewArea = document.getElementById('previewArea');
      const form = document.getElementById('commandForm');
      const formTitle = document.getElementById('formTitle');
      const formHint = document.getElementById('formHint');
      const modeHint = document.getElementById('modeHint');
      const reviewDialog = document.getElementById('reviewDialog');
      const reviewTitle = document.getElementById('reviewTitle');
      const reviewSummary = document.getElementById('reviewSummary');
      const reviewComment = document.getElementById('reviewComment');
      const reviewConfirmBtn = document.getElementById('reviewConfirmBtn');
      const reviewCancelBtn = document.getElementById('reviewCancelBtn');
      const replyType = document.getElementById('replyType');
      const contentTextWrap = document.getElementById('contentTextWrap');
      const imageUrlWrap = document.getElementById('imageUrlWrap');
      const imageUploadWrap = document.getElementById('imageUploadWrap');
      const imageFileInput = document.getElementById('imageFile');
      const pasteImageBtn = document.getElementById('pasteImageBtn');

      let currentFilter = 'ALL';
      let commandItems = [];
      let pendingReviewAction = null;

      function setStatus(target, text, type) {
        target.textContent = text || '';
        target.className = 'status' + (type ? ' ' + type : '');
      }

      function loadStoredCommandKey() {
        try {
          commandKeyInput.value =
            localStorage.getItem(COMMAND_KEY_STORAGE_KEY) || '';
        } catch (_error) {
          commandKeyInput.value = '';
        }
      }

      function persistCommandKey() {
        const key = commandKeyInput.value.trim();
        try {
          if (key) {
            localStorage.setItem(COMMAND_KEY_STORAGE_KEY, key);
          } else {
            localStorage.removeItem(COMMAND_KEY_STORAGE_KEY);
          }
        } catch (_error) {
          // localStorage may be unavailable in private/restricted contexts.
        }
      }

      function hasManagementKey() {
        return Boolean(commandKeyInput.value.trim());
      }

      function getHeaders(_useReviewKey = false, includeJson = true) {
        const key = commandKeyInput.value.trim();
        const headers = {};
        if (key) {
          headers['x-command-key'] = key;
        }
        if (includeJson) {
          headers['Content-Type'] = 'application/json';
        }
        return headers;
      }

      function syncModeHint() {
        if (hasManagementKey()) {
          modeHint.innerHTML =
            '<strong>管理模式</strong>：可以编辑任意命令；保存即直接生效，无需再审批。';
        } else {
          modeHint.innerHTML =
            '<strong>投稿模式</strong>：可以新建和预览命令；审核、编辑、删除需要先输入管理 key。';
        }
      }

      function setFormMode(mode, item) {
        if (mode === 'edit-managed') {
          formTitle.textContent = '编辑命令';
          formHint.textContent = `当前编辑“${item?.command || ''}”；保存后会直接生效。`;
          return;
        }
        if (mode === 'edit-pending') {
          formTitle.textContent = '编辑待审核命令';
          formHint.textContent =
            '保存后仍会重置为待审核状态，审核备注会被清空。';
          return;
        }
        if (mode === 'edit-rejected') {
          formTitle.textContent = '修改被拒命令并重新提交';
          formHint.textContent = '保存后会作为待审核版本重新进入审核流程。';
          return;
        }
        formTitle.textContent = '新建命令';
        formHint.textContent =
          '投稿模式下可直接新建和预览；填入管理 key 后可编辑任意命令并直接发布。';
      }

      function syncReplyFields() {
        const value = replyType.value;
        contentTextWrap.style.display = value === 'IMAGE_URL' ? 'none' : 'grid';
        imageUrlWrap.style.display = value === 'IMAGE_URL' ? 'grid' : 'none';
        imageUploadWrap.style.display = value === 'IMAGE_URL' ? 'grid' : 'none';
      }

      function readFormData() {
        return {
          command: document.getElementById('command').value.trim(),
          description: document.getElementById('description').value.trim(),
          replyType: replyType.value,
          contentText: document.getElementById('contentText').value,
          imageUrl: document.getElementById('imageUrl').value.trim(),
        };
      }

      function validateFormData(data) {
        if (!data.command) {
          throw new Error('命令不能为空');
        }
        if (
          (data.replyType === 'TEXT' || data.replyType === 'RENDERED_IMAGE') &&
          !data.contentText.trim()
        ) {
          throw new Error(
            data.replyType === 'TEXT'
              ? '文本类型必须填写文本内容'
              : '文本渲染图必须填写文本内容',
          );
        }
        if (data.replyType === 'IMAGE_URL' && !data.imageUrl) {
          throw new Error('图片类型必须填写图片 URL，或粘贴/选择图片转成 base64');
        }
      }

      function fillForm(item, mode = 'edit-pending') {
        document.getElementById('commandId').value = item.id || '';
        document.getElementById('command').value = item.command || '';
        document.getElementById('description').value = item.description || '';
        document.getElementById('replyType').value = item.replyType || 'TEXT';
        document.getElementById('contentText').value = item.contentText || '';
        document.getElementById('imageUrl').value = item.imageUrl || '';
        setFormMode(mode, item);
        syncReplyFields();
        form.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      function resetForm() {
        document.getElementById('commandId').value = '';
        document.getElementById('command').value = '';
        document.getElementById('description').value = '';
        document.getElementById('replyType').value = 'TEXT';
        document.getElementById('contentText').value = '';
        document.getElementById('imageUrl').value = '';
        imageFileInput.value = '';
        setFormMode('create');
        syncReplyFields();
        setStatus(formStatus, '', '');
      }

      function assertUploadableImage(file) {
        if (!file || !file.type?.startsWith('image/')) {
          throw new Error('只能上传图片文件');
        }
        if (file.type === 'image/svg+xml') {
          throw new Error('暂不支持 SVG 图片');
        }
        if (file.size > 2 * 1024 * 1024) {
          throw new Error('图片过大，请控制在 2MB 以内');
        }
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ''));
          reader.onerror = () => reject(new Error('图片读取失败'));
          reader.readAsDataURL(file);
        });
      }

      async function applyImageFile(file, sourceLabel) {
        assertUploadableImage(file);
        const dataUrl = await fileToDataUrl(file);
        document.getElementById('replyType').value = 'IMAGE_URL';
        syncReplyFields();
        document.getElementById('imageUrl').value = dataUrl;
        renderPreview({ type: 'image', content: dataUrl });
        setStatus(formStatus, `${sourceLabel}已转成 base64 并回填`, 'success');
      }

      async function readClipboardImageFile() {
        if (!navigator.clipboard?.read) {
          throw new Error('当前浏览器不支持读取剪贴板图片');
        }

        const clipboardItems = await navigator.clipboard.read();
        for (const item of clipboardItems) {
          const imageType = item.types.find((type) =>
            type.startsWith('image/'),
          );
          if (!imageType) {
            continue;
          }

          const blob = await item.getType(imageType);
          const extension = imageType.split('/')[1] || 'png';
          return new File([blob], `clipboard-image.${extension}`, {
            type: imageType,
          });
        }

        throw new Error('剪贴板里没有图片');
      }

      function renderPreview(result) {
        if (!result || !result.content) {
          previewArea.innerHTML = '<span class="muted">没有可预览内容</span>';
          return;
        }

        if (result.type === 'image') {
          previewArea.innerHTML = '';
          const img = document.createElement('img');
          img.src = result.content;
          img.alt = 'preview';
          previewArea.appendChild(img);
          return;
        }

        previewArea.innerHTML = '';
        const pre = document.createElement('pre');
        pre.textContent = result.content;
        previewArea.appendChild(pre);
      }

      async function request(path, options = {}) {
        const response = await fetch(path, options);
        const text = await response.text();
        let data = null;
        try {
          data = text ? JSON.parse(text) : null;
        } catch (_error) {
          data = text;
        }
        if (!response.ok) {
          throw new Error(data?.message || text || '请求失败');
        }
        return data;
      }

      async function runWithButton(button, loadingText, task) {
        const oldText = button?.textContent;
        if (button) {
          button.disabled = true;
          button.textContent = loadingText;
        }
        try {
          return await task();
        } finally {
          if (button) {
            button.disabled = false;
            button.textContent = oldText;
          }
        }
      }

      function escapeHtml(value) {
        return String(value || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function statusLabel(status) {
        if (status === 'APPROVED') return '已通过';
        if (status === 'REJECTED') return '已拒绝';
        return '待审核';
      }

      function effectLabel(item) {
        return item.status === 'APPROVED' && item.enabled
          ? '当前可执行'
          : '当前不生效';
      }

      function canUseManagementAction() {
        return hasManagementKey();
      }

      function createActionButton(label, className, disabled, handler) {
        const button = document.createElement('button');
        button.className = className;
        button.type = 'button';
        button.textContent = label;
        button.disabled = disabled;
        if (handler) {
          button.addEventListener('click', (event) =>
            handler(event.currentTarget),
          );
        }
        return button;
      }

      function renderActions(container, item) {
        const canManage = canUseManagementAction();
        container.innerHTML = '';
        container.appendChild(
          createActionButton('预览', 'secondary', false, (button) =>
            runWithButton(button, '预览中...', () => previewItem(item)),
          ),
        );

        if (item.status === 'PENDING') {
          container.appendChild(
            createActionButton('编辑', 'secondary', !canManage, () =>
              fillForm(item, canManage ? 'edit-managed' : 'edit-pending'),
            ),
          );
          container.appendChild(
            createActionButton('审核通过', 'success', !canManage, () =>
              openReviewDialog(item, 'approve'),
            ),
          );
          container.appendChild(
            createActionButton('审核拒绝', 'danger', !canManage, () =>
              openReviewDialog(item, 'reject'),
            ),
          );
          container.appendChild(
            createActionButton('删除', 'danger', !canManage, (button) =>
              runWithButton(button, '删除中...', () => removeItem(item.id)),
            ),
          );
        } else if (item.status === 'REJECTED') {
          container.appendChild(
            createActionButton('编辑', 'secondary', !canManage, () =>
              fillForm(item, canManage ? 'edit-managed' : 'edit-rejected'),
            ),
          );
          container.appendChild(
            createActionButton(
              '重新提交审核',
              'warning',
              !canManage,
              (button) =>
                runWithButton(button, '提交中...', () => submitItem(item.id)),
            ),
          );
          container.appendChild(
            createActionButton('删除', 'danger', !canManage, (button) =>
              runWithButton(button, '删除中...', () => removeItem(item.id)),
            ),
          );
        } else if (item.status === 'APPROVED') {
          container.appendChild(
            createActionButton('编辑', 'secondary', !canManage, () =>
              fillForm(item, 'edit-managed'),
            ),
          );
        }

        if (!canManage && item.status !== 'APPROVED') {
          container.appendChild(
            createActionButton('管理操作需 key', 'secondary', true),
          );
        }
      }

      function renderList() {
        syncModeHint();
        const items =
          currentFilter === 'ALL'
            ? commandItems
            : commandItems.filter((item) => item.status === currentFilter);

        listEl.innerHTML = '';

        if (!items.length) {
          listEl.innerHTML = '<div class="muted">当前筛选下没有命令。</div>';
          return;
        }

        items.forEach((item) => {
          const article = document.createElement('article');
          article.className = `item ${(item.status || 'PENDING').toLowerCase()}`;
          article.innerHTML = `
            <header>
              <div>
                <h3>${escapeHtml(item.command)}</h3>
                <p style="margin-top:6px">${escapeHtml(item.description || '无说明')}</p>
              </div>
              <div class="chips">
                <span class="chip ${String(item.status || 'PENDING').toLowerCase()}">${statusLabel(item.status)}</span>
                <span class="chip">${escapeHtml(effectLabel(item))}</span>
              </div>
            </header>
            <div class="state-line">
              <span class="chip">${escapeHtml(item.replyType)}</span>
              <span class="chip">${escapeHtml(item.enabled ? 'enabled=true' : 'enabled=false')}</span>
              <span class="chip">更新：${escapeHtml(item.updateTime ? new Date(item.updateTime).toLocaleString() : '未知')}</span>
            </div>
            <div class="muted" style="margin-top:10px">审核备注：${escapeHtml(item.reviewComment || '无')}</div>
            <div class="actions" style="margin-top:14px"></div>
          `;

          renderActions(article.querySelector('.actions'), item);
          listEl.appendChild(article);
        });
      }

      function openReviewDialog(item, action) {
        pendingReviewAction = { id: item.id, action };
        const isApprove = action === 'approve';
        reviewTitle.textContent = isApprove ? '审核通过命令' : '审核拒绝命令';
        reviewConfirmBtn.textContent = isApprove ? '确认通过' : '确认拒绝';
        reviewConfirmBtn.className = isApprove ? 'primary' : 'danger';
        reviewComment.value = isApprove ? '审核通过' : '审核拒绝';
        reviewSummary.innerHTML = `
          <div><strong>命令：</strong>${escapeHtml(item.command)}</div>
          <div style="margin-top:8px"><strong>说明：</strong>${escapeHtml(item.description || '无说明')}</div>
          <div style="margin-top:8px"><strong>回复类型：</strong>${escapeHtml(item.replyType)}</div>
          <div style="margin-top:8px"><strong>当前状态：</strong>${statusLabel(item.status)} / ${escapeHtml(effectLabel(item))}</div>
        `;

        if (typeof reviewDialog.showModal === 'function') {
          reviewDialog.showModal();
        } else {
          reviewDialog.setAttribute('open', 'open');
        }
      }

      function closeReviewDialog() {
        pendingReviewAction = null;
        if (typeof reviewDialog.close === 'function') {
          reviewDialog.close();
        } else {
          reviewDialog.removeAttribute('open');
        }
      }

      async function loadCommands() {
        try {
          setStatus(topStatus, '加载中...', '');
          commandItems = await request('/api/command/config', {
            headers: getHeaders(false),
          });
          renderList();
          setStatus(
            topStatus,
            `已加载 ${commandItems.length} 条命令`,
            'success',
          );
        } catch (error) {
          setStatus(topStatus, error.message, 'error');
        }
      }

      async function previewItem(item) {
        try {
          const data = await request('/api/command/config/preview', {
            method: 'POST',
            headers: getHeaders(false),
            body: JSON.stringify({
              command: item.command,
              description: item.description || '',
              replyType: item.replyType,
              contentText: item.contentText || '',
              imageUrl: item.imageUrl || '',
            }),
          });
          renderPreview(data);
        } catch (error) {
          setStatus(formStatus, error.message, 'error');
        }
      }

      async function submitItem(id) {
        try {
          await request(`/api/command/config/${id}/submit`, {
            method: 'POST',
            headers: getHeaders(false),
          });
          setStatus(topStatus, '已提交审核', 'success');
          await loadCommands();
        } catch (error) {
          setStatus(topStatus, error.message, 'error');
        }
      }

      async function approveItem(id, comment) {
        try {
          await request(`/api/command/config/${id}/approve`, {
            method: 'POST',
            headers: getHeaders(true),
            body: JSON.stringify({ comment: comment || '审核通过' }),
          });
          setStatus(topStatus, '审核通过成功', 'success');
          await loadCommands();
        } catch (error) {
          setStatus(topStatus, error.message, 'error');
        }
      }

      async function rejectItem(id, comment) {
        try {
          await request(`/api/command/config/${id}/reject`, {
            method: 'POST',
            headers: getHeaders(true),
            body: JSON.stringify({ comment: comment || '审核拒绝' }),
          });
          setStatus(topStatus, '已拒绝该命令', 'success');
          await loadCommands();
        } catch (error) {
          setStatus(topStatus, error.message, 'error');
        }
      }

      async function removeItem(id) {
        if (!confirm('确定删除这条命令吗？')) {
          return;
        }

        try {
          await request(`/api/command/config/${id}`, {
            method: 'DELETE',
            headers: getHeaders(false, false),
          });
          setStatus(topStatus, '删除成功', 'success');
          await loadCommands();
        } catch (error) {
          setStatus(topStatus, error.message, 'error');
        }
      }

      document.querySelectorAll('[data-filter]').forEach((button) => {
        button.addEventListener('click', () => {
          currentFilter = button.getAttribute('data-filter');
          renderList();
        });
      });

      replyType.addEventListener('change', syncReplyFields);
      commandKeyInput.addEventListener('input', () => {
        persistCommandKey();
        syncModeHint();
        renderList();
      });
      document
        .getElementById('loadBtn')
        .addEventListener('click', loadCommands);
      document
        .getElementById('previewBtn')
        .addEventListener('click', async (event) => {
          try {
            const payload = readFormData();
            validateFormData(payload);
            const data = await runWithButton(
              event.currentTarget,
              '预览中...',
              () =>
                request('/api/command/config/preview', {
                  method: 'POST',
                  headers: getHeaders(false),
                  body: JSON.stringify(payload),
                }),
            );
            renderPreview(data);
            setStatus(formStatus, '预览生成成功', 'success');
          } catch (error) {
            setStatus(formStatus, error.message, 'error');
          }
        });

      document.getElementById('resetBtn').addEventListener('click', resetForm);
      reviewCancelBtn.addEventListener('click', closeReviewDialog);
      reviewConfirmBtn.addEventListener('click', async (event) => {
        if (!pendingReviewAction) {
          return;
        }
        const { id, action } = pendingReviewAction;
        const comment =
          reviewComment.value.trim() ||
          (action === 'approve' ? '审核通过' : '审核拒绝');
        await runWithButton(event.currentTarget, '提交中...', async () => {
          if (action === 'approve') {
            await approveItem(id, comment);
          } else {
            await rejectItem(id, comment);
          }
          closeReviewDialog();
        });
      });
      document.getElementById('clearImageBtn').addEventListener('click', () => {
        document.getElementById('imageUrl').value = '';
        imageFileInput.value = '';
        setStatus(formStatus, '图片内容已清空', 'success');
      });

      imageFileInput.addEventListener('change', async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) {
          return;
        }

        try {
          setStatus(
            formStatus,
            `正在读取图片：${file.name || '未命名图片'}`,
            '',
          );
          await applyImageFile(file, '图片');
        } catch (error) {
          imageFileInput.value = '';
          setStatus(formStatus, error.message, 'error');
        }
      });

      pasteImageBtn.addEventListener('click', async (event) => {
        try {
          const file = await readClipboardImageFile();
          setStatus(formStatus, '正在读取剪贴板图片...', '');
          await runWithButton(event.currentTarget, '读取中...', () =>
            applyImageFile(file, '剪贴板图片'),
          );
        } catch (error) {
          setStatus(formStatus, error.message, 'error');
        }
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          const id = document.getElementById('commandId').value.trim();
          const path = id ? `/api/command/config/${id}` : '/api/command/config';
          const method = id ? 'PUT' : 'POST';
          const payload = readFormData();
          validateFormData(payload);
          await runWithButton(
            document.getElementById('saveBtn'),
            '保存中...',
            () =>
              request(path, {
                method,
                headers: getHeaders(false),
                body: JSON.stringify(payload),
              }),
          );
          setStatus(
            formStatus,
            hasManagementKey()
              ? id
                ? '更新成功，已直接生效'
                : '创建成功，已直接发布'
              : id
                ? '更新成功，状态已重置为待审核'
                : '创建成功，等待审核',
            'success',
          );
          loadStoredCommandKey();
          resetForm();
          await loadCommands();
        } catch (error) {
          setStatus(formStatus, error.message, 'error');
        }
      });

      loadStoredCommandKey();
      resetForm();
      syncModeHint();
    </script>
  </body>
</html>
